# PostgreSQL Client Authentication Configuration File for Kerberos E2E tests.
# Allows GSSAPI authentication from any client; the realm is not validated
# inline because we only have one realm in the test fixture.
#
# Format: TYPE  DATABASE  USER  ADDRESS  METHOD  [OPTIONS]

# Local Unix-socket access stays trust so the postgres bootstrap and the
# image's healthcheck still work without a ticket.
local   all             all                                     trust

# All TCP connections must use GSSAPI. include_realm=0 strips the @REALM
# suffix from the principal so "temporal@EXAMPLE.LOCAL" maps to the
# Postgres role "temporal".
host    all             all             0.0.0.0/0               gss include_realm=0 krb_realm=EXAMPLE.LOCAL
host    all             all             ::/0                    gss include_realm=0 krb_realm=EXAMPLE.LOCAL
